<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ page_title | default("Football Explorer") }}{% endblock %}</title>
    <script>(function(){try{var t=localStorage.getItem("theme");if(t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.classList.add("dark")}}catch(e){}})()</script>
    <link rel="stylesheet" href="/static/css/app.css">
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="/static/js/htmx.min.js" defer></script>
    <script src="/static/js/theme.js" defer></script>
    {% block head %}{% endblock %}
  </head>
  <body class="min-h-svh bg-background text-foreground">
    {% set selected_competition = competition | default("PL") %}
    <div class="flex min-h-svh">
      <aside class="hidden w-64 shrink-0 border-r border-border bg-sidebar p-4 text-sidebar-foreground md:flex md:flex-col">
        <div class="mb-6 flex items-center justify-between gap-2">
          <a href="/?competition={{ selected_competition }}&page=1" class="truncate text-base font-semibold">Football Explorer</a>
        </div>
        <nav aria-label="Pages" class="flex flex-1 flex-col gap-1">
          <a class="rounded-md px-3 py-2 text-sm font-medium hover:bg-sidebar-accent" href="/?competition={{ selected_competition }}&page=1">Live Scores</a>
          <a class="rounded-md px-3 py-2 text-sm font-medium hover:bg-sidebar-accent" href="/standings?competition={{ selected_competition }}">Standings</a>
          <a class="rounded-md px-3 py-2 text-sm font-medium hover:bg-sidebar-accent" href="/stats?competition={{ selected_competition }}">Stats</a>
        </nav>
        <button type="button" data-theme-toggle class="mt-4 rounded-md border border-border px-3 py-2 text-sm hover:bg-sidebar-accent" aria-label="Toggle theme">Toggle theme</button>
      </aside>
      <main class="min-w-0 flex-1 p-4 pt-10">
        <div class="mx-auto max-w-6xl">
          {% block content %}
            <h1 class="mb-6 text-2xl font-semibold tracking-tight">{{ page_title | default("Football Explorer") }}</h1>
          {% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
